<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Məhsul Kataloqu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #c9a96e;
    --accent2: #e8c98a;
    --text: #f0ede6;
    --muted: #888;
    --border: #2e2e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,169,110,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.02em;
    color: var(--accent2);
  }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
    padding: 50px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeUp 0.6s ease both;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(201,169,110,0.12);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  .card-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .card-img-placeholder {
    width: 100%; height: 220px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.8rem;
  }

  .card-body {
    padding: 20px;
  }

  .card-id {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    line-height: 1.3;
    margin-bottom: 16px;
    color: var(--text);
  }

  .qr-section {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .qr-box {
    background: #fff;
    padding: 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .qr-box canvas, .qr-box img {
    display: block;
  }

  .qr-label {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .qr-label span {
    display: block;
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .loading {
    text-align: center;
    padding: 100px 20px;
    color: var(--muted);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 80px 20px;
    color: #e07070;
  }

  footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <h1>Məhsul Kataloqu</h1>
  <p>QR kodu oxutaraq məhsul haqqında ətraflı məlumat əldə edin</p>
</header>

<div class="grid" id="grid">
  <div class="loading">Məlumatlar yüklənir</div>
</div>

<footer>
  © 2025 · Bütün hüquqlar qorunur
</footer>

<script>
const SHEET_ID = '1GycxQx2qRQy3hUFt4CHVbi56r8BtcOZPfgypiLnAQM0';
const BASE_URL = 'https://sadimammad1995.github.io/mehsul-kataloq';

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rows = json.table.rows;
  return rows.map(r => r.c.map(c => c ? (c.v !== null && c.v !== undefined ? String(c.v) : '') : ''));
}

function generateQR(containerId, url) {
  new QRCode(document.getElementById(containerId), {
    text: url,
    width: 80,
    height: 80,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

async function init() {
  const grid = document.getElementById('grid');
  try {
    const rows = await fetchSheet('Products');
    // skip header row
    const products = rows.slice(1).filter(r => r[0]);

    if (products.length === 0) {
      grid.innerHTML = '<div class="error">Məhsul tapılmadı. Google Sheets-i yoxlayın.</div>';
      return;
    }

    grid.innerHTML = '';

    products.forEach((row, idx) => {
      const [id, name, imageUrl, description] = row;
      const productUrl = `${BASE_URL}/product.html?id=${id}`;
      const qrId = `qr-${id}`;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${imageUrl
          ? `<img class="card-img" src="${imageUrl}" alt="${name}" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>Şəkil yüklənmədi</div>'">`
          : `<div class="card-img-placeholder">Şəkil yoxdur</div>`
        }
        <div class="card-body">
          <div class="card-id">№ ${id}</div>
          <div class="card-name">${name}</div>
          <div class="qr-section">
            <div class="qr-box" id="${qrId}"></div>
            <div class="qr-label">
              <span>QR Kod</span>
              Telefon kameranızla oxutun — məhsul səhifəsinə keçid
            </div>
          </div>
        </div>
      `;

      grid.appendChild(card);

      // Generate QR after DOM insert
      setTimeout(() => generateQR(qrId, productUrl), 50 * idx);
    });

  } catch (err) {
    console.error(err);
    grid.innerHTML = `<div class="error">Xəta baş verdi: ${err.message}<br><br>Google Sheets icazəsini yoxlayın.</div>`;
  }
}

init();
</script>
</body>
</html>
